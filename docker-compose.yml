services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: life
      POSTGRES_PASSWORD: life
      POSTGRES_DB: life
    ports:
      - "5432:5432"
    volumes:
      - life-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U life -d life"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  life-db-data:
